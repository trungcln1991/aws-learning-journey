name: Auto-Generate Lessons

on:
  schedule:
    # Every Monday 7:00 AM Vietnam time (UTC+7 → 00:00 UTC Monday)
    - cron: '0 0 * * 1'
  workflow_dispatch:
    inputs:
      count:
        description: 'Number of lessons to generate'
        required: false
        default: '3'

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate lessons
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          COUNT="${{ github.event.inputs.count || '3' }}"
          node scripts/generate-lesson.mjs --count $COUNT

      - name: Check for changes
        id: changes
        run: |
          # git diff --quiet chỉ thấy file ĐÃ TRACK bị sửa, bỏ sót file MỚI (untracked) —
          # bug thật: 1 lượt regen-backfill chỉ sinh lại đúng 1 bài đã có placeholder trong
          # meta.json thì newLessons rỗng → meta.json không đổi → git diff thấy "sạch" dù
          # file lesson mới đã nằm trên đĩa (untracked) → bỏ qua commit, mất nội dung vừa sinh.
          if [ -z "$(git status --porcelain)" ]; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit new lessons
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add lessons/
          LESSON_COUNT=$(git diff --staged --name-only | grep -c "lessons/2" || true)
          git commit -m "auto: generate ${LESSON_COUNT} new lessons [skip ci]"
          git push
