name: Update Learning Context

on:
  repository_dispatch:
    types: [japfa-activity]

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Write context.json
        env:
          TOPICS: ${{ toJSON(github.event.client_payload.suggest_topics) }}
          COMMIT_MSG: ${{ github.event.client_payload.commit_msg }}
        run: |
          python3 - <<'EOF'
          import json, os
          from datetime import datetime, timezone

          topics = json.loads(os.environ.get('TOPICS', '[]'))
          commit_msg = os.environ.get('COMMIT_MSG', '')

          context = {
            'suggest_topics': topics,
            'commit_msg': commit_msg,
            'updated_at': datetime.now(timezone.utc).strftime('%Y-%m-%dT%H:%M:%SZ')
          }

          with open('context.json', 'w', encoding='utf-8') as f:
            json.dump(context, f, indent=2, ensure_ascii=False)

          print('✅ context.json updated:')
          print(json.dumps(context, indent=2, ensure_ascii=False))
          EOF

      - name: Commit & push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add context.json
          git diff --staged --quiet || git commit -m "chore: sync learning context from Japfa [skip ci]"
          git push
