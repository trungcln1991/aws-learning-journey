<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#16130D">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>AWS News — AWS Journey</title>
  <link rel="stylesheet" href="css/app.css">
  <style>
    .news-filter {
      display: flex; overflow-x: auto; gap: 8px;
      padding: 12px 16px; border-bottom: 1.5px solid var(--line);
      scrollbar-width: none; position: sticky; top: 56px; z-index: 50;
      background: rgba(244,241,233,.95); backdrop-filter: blur(8px);
    }
    .news-filter::-webkit-scrollbar { display: none; }
    .filter-btn {
      flex-shrink: 0; padding: 7px 14px; border-radius: 999px;
      border: 2px solid var(--ink); background: var(--paper);
      font-size: .78rem; font-weight: 700; cursor: pointer;
      font-family: monospace; white-space: nowrap; transition: all .15s;
      color: var(--ink); letter-spacing: .02em;
    }
    .filter-btn.active { background: var(--ink); color: var(--paper); }
    .filter-btn:hover:not(.active) { background: var(--paper-2); }

    .status-bar {
      margin: 12px 16px 0;
      padding: 10px 14px; border-radius: 10px;
      border: 2px solid; display: flex; align-items: center; gap: 10px;
    }
    .status-bar.ok { border-color: var(--green); background: rgba(28,122,71,.07); }
    .status-bar.issues { border-color: var(--red); background: rgba(195,45,26,.07); }
    .status-bar.unknown { border-color: var(--line-strong); background: var(--paper-2); }
    .sb-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; animation: pulse 2s infinite; }
    .sb-dot.green { background: var(--green); }
    .sb-dot.red { background: var(--red); }
    .sb-dot.gray { background: var(--muted); animation: none; }
    @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:.4; } }
    .sb-text { flex: 1; }
    .sb-title { font-weight: 700; font-size: .88rem; }
    .sb-sub { font-size: .72rem; color: var(--muted); font-family: monospace; }

    .news-section-title {
      padding: 16px 16px 8px;
      font-family: monospace; font-size: .68rem; font-weight: 900;
      text-transform: uppercase; letter-spacing: .15em; color: var(--muted);
      display: flex; align-items: center; gap: 8px; justify-content: space-between;
    }
    .news-count {
      background: var(--ink); color: var(--paper);
      padding: 2px 8px; border-radius: 999px;
      font-size: .65rem; font-family: monospace;
    }

    .news-card {
      margin: 0 16px 10px; padding: 14px;
      border: 2px solid var(--ink); border-radius: 12px;
      background: var(--paper); box-shadow: 3px 3px 0 rgba(22,19,13,.07);
      cursor: pointer; transition: all .15s; text-decoration: none; display: block; color: var(--ink);
    }
    .news-card:hover { transform: translateY(-1px); box-shadow: 4px 5px 0 rgba(22,19,13,.1); }
    .news-card-head { display: flex; align-items: flex-start; gap: 8px; margin-bottom: 6px; }
    .nc-icon { font-size: 1.1rem; flex-shrink: 0; margin-top: 2px; }
    .nc-title { font-weight: 700; font-size: .9rem; line-height: 1.4; flex: 1; }
    .nc-meta { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; margin-bottom: 6px; }
    .nc-date { font-family: monospace; font-size: .68rem; color: var(--muted); }
    .nc-tag {
      font-family: monospace; font-size: .62rem; font-weight: 700;
      padding: 2px 7px; border-radius: 999px; border: 1.5px solid;
    }
    .nc-desc { font-size: .82rem; color: var(--ink-soft); line-height: 1.5; }
    .nc-link {
      display: inline-flex; align-items: center; gap: 4px;
      margin-top: 8px; font-size: .78rem; font-weight: 700;
      color: var(--red); font-family: monospace;
    }

    .news-card.security { border-left: 4px solid var(--red); }
    .news-card.blog { border-left: 4px solid var(--blue); }
    .news-card.whats_new { border-left: 4px solid var(--green); }

    .updated-badge {
      display: flex; align-items: center; gap: 6px;
      padding: 8px 16px; font-family: monospace; font-size: .7rem;
      color: var(--muted); border-bottom: 1px solid var(--line);
      background: var(--paper-2);
    }
    .live-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--green); animation: pulse 1.5s infinite;
    }

    .learn-badge {
      display: inline-flex; align-items: center; gap: 4px;
      margin-top: 8px; padding: 4px 10px;
      background: rgba(28,122,71,.1); color: var(--green);
      border-radius: 999px; font-family: monospace; font-size: .68rem;
      font-weight: 700; border: 1px solid var(--green);
    }

    .new-badge {
      display: inline-flex; align-items: center; gap: 4px;
      margin-top: 8px; margin-left: 6px; padding: 4px 10px;
      background: rgba(195,45,26,.1); color: var(--red);
      border-radius: 999px; font-family: monospace; font-size: .68rem;
      font-weight: 700; border: 1px solid var(--red);
    }

    .new-banner {
      margin: 12px 16px 0; padding: 10px 14px; border-radius: 10px;
      border: 2px solid var(--red); background: rgba(195,45,26,.07);
      font-family: monospace; font-size: .78rem; font-weight: 700;
      color: var(--red); display: flex; align-items: center; justify-content: space-between;
      gap: 8px; cursor: pointer;
    }
    .new-banner:hover { background: rgba(195,45,26,.12); }

    .empty-news {
      text-align: center; padding: 32px 16px; color: var(--muted);
    }
    .empty-news .ei { font-size: 2.5rem; margin-bottom: 8px; }

    #news-container { padding-bottom: 8px; }
  </style>
</head>
<body data-page="news">
<script src="js/auth.js"></script>

  <!-- TOP NAV -->
  <nav class="top-nav">
    <span class="app-name">📰 AWS News</span>
    <span id="last-update" style="font-family:monospace;font-size:.68rem;color:var(--muted)">Đang tải...</span>
  </nav>

  <!-- LIVE BADGE -->
  <div class="updated-badge">
    <span class="live-dot"></span>
    <span>Cập nhật hàng ngày lúc 8:00 SA · Nguồn: aws.amazon.com</span>
  </div>

  <!-- AWS STATUS -->
  <div id="status-bar"></div>

  <!-- NEW-SINCE-LAST-VISIT BANNER -->
  <div id="new-banner"></div>

  <!-- FILTER TABS -->
  <div class="news-filter">
    <button class="filter-btn active" data-filter="all" onclick="filterNews('all', this)">🌐 Tất cả</button>
    <button class="filter-btn" data-filter="new" onclick="filterNews('new', this)">🆕 Mới từ lần trước</button>
    <button class="filter-btn" data-filter="whats_new" onclick="filterNews('whats_new', this)">🆕 Services mới</button>
    <button class="filter-btn" data-filter="security" onclick="filterNews('security', this)">🔒 Security</button>
    <button class="filter-btn" data-filter="blog" onclick="filterNews('blog', this)">📝 Blog</button>
    <button class="filter-btn" data-filter="learn" onclick="filterNews('learn', this)">📚 Liên quan bài học</button>
    <button class="filter-btn" data-filter="japfa" onclick="filterNews('japfa', this)">🏭 Japfa</button>
  </div>

  <!-- NEWS CONTENT -->
  <div id="news-container">
    <div class="loader" style="margin-top:32px">
      <div class="spinner"></div>
      <span style="font-family:monospace;font-size:.8rem;color:var(--muted)">Đang tải tin tức AWS...</span>
    </div>
  </div>

  <!-- BOTTOM NAV -->
  <nav class="bottom-nav">
    <a href="index.html"><span class="nav-icon">🏠</span><span>Trang chủ</span></a>
    <a href="lessons.html"><span class="nav-icon">📚</span><span>Bài học</span></a>
    <a href="quiz.html"><span class="nav-icon">✏️</span><span>Luyện tập</span></a>
    <a href="guides.html"><span class="nav-icon">📖</span><span>Thư viện</span></a>
    <a href="news.html" class="active"><span class="nav-icon">📰</span><span>News</span></a>
    <a href="stats.html"><span class="nav-icon">📊</span><span>Thống kê</span></a>
  </nav>

  <script>
  let newsData = null;
  let currentFilter = 'all';

  const LESSON_TOPICS = ['ec2','s3','vpc','iam','rds','alb','cloudwatch','route53','lambda','ecs'];

  // ===== UTILITIES =====
  function formatDate(iso) {
    if (!iso) return '';
    try { return new Date(iso).toLocaleDateString('vi-VN', { day:'2-digit', month:'2-digit', year:'numeric' }); }
    catch { return iso.slice(0, 10); }
  }

  // Let browser strip HTML — handles entities, nested tags correctly
  function stripHtml(s) {
    if (!s) return '';
    const d = document.createElement('div');
    d.innerHTML = s;
    return d.textContent.replace(/\s+/g, ' ').trim();
  }

  function escAttr(s) {
    return (s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;');
  }

  function tagColor(tag) {
    const map = {
      'EC2':'var(--blue)','S3':'var(--amber)','RDS':'#6B3E99',
      'Lambda':'#F97316','VPC':'var(--blue)','IAM':'var(--red)',
      'Security Hub':'var(--red)','Inspector':'var(--red)','WAF':'var(--red)',
      'CloudWatch':'var(--green)','Bedrock':'#6B3E99','default':'var(--muted)'
    };
    return map[tag] || map.default;
  }

  function isRelatedToLesson(item) {
    const text = ((item.title||'') + ' ' + (item.description||'')).toLowerCase();
    return LESSON_TOPICS.some(t => text.includes(t));
  }

  // ===== NEW-SINCE-LAST-VISIT (per-device, localStorage) =====
  const LAST_SEEN_KEY = 'news_last_seen';
  let prevSeenAt = null; // timestamp of the visit BEFORE this one — null on first-ever visit

  function isNewSince(item) {
    if (!prevSeenAt || !item.date) return false;
    const t = new Date(item.date).getTime();
    return Number.isFinite(t) && t > new Date(prevSeenAt).getTime();
  }

  function countNewItems() {
    if (!newsData || !prevSeenAt) return 0;
    const all = [...(newsData.whats_new||[]), ...(newsData.security||[]), ...(newsData.blog||[])];
    return all.filter(isNewSince).length;
  }

  // ===== CLIENT-SIDE TRANSLATION CACHE (fallback while workflow hasn't run) =====
  const TCACHE_KEY = 'news_vi_v2';
  const tCache = (() => { try { return JSON.parse(localStorage.getItem(TCACHE_KEY)||'{}'); } catch { return {}; } })();
  function saveTCache() { try { localStorage.setItem(TCACHE_KEY, JSON.stringify(tCache)); } catch {} }

  async function translateOne(text) {
    if (!text) return null;
    const key = text.slice(0, 90);
    if (tCache[key]) return tCache[key];
    try {
      const r = await fetch(
        `https://api.mymemory.translated.net/get?q=${encodeURIComponent(text.slice(0,300))}&langpair=en|vi`,
        { signal: AbortSignal.timeout(6000) }
      );
      const d = await r.json();
      const vi = d.responseData?.translatedText;
      if (vi && vi !== text && d.responseStatus === 200) {
        tCache[key] = vi; saveTCache(); return vi;
      }
    } catch {}
    return null;
  }

  async function translatePending() {
    // Only translate news card pending items (not incidents, handled separately)
    const els = [...document.querySelectorAll('.nc-trans-pending[data-trans-en]')];
    for (const el of els) {
      const text = el.dataset.transEn;
      el.removeAttribute('data-trans-en');
      const vi = await translateOne(text);
      if (vi) {
        el.className = 'nc-lang-vi';
        el.textContent = '🇻🇳 ' + vi;
      } else {
        el.style.display = 'none';
      }
      await new Promise(r => setTimeout(r, 150));
    }
  }

  // ===== RENDER ITEM =====
  function renderItem(item, type) {
    const icons = { whats_new: '🆕', security: '🔒', blog: '📝' };
    const isLearn = isRelatedToLesson(item);
    const descEn = stripHtml(item.description || '');
    const descShort = descEn.slice(0, 220) + (descEn.length > 220 ? '...' : '');
    const descVi = item.description_vi || null;
    const cacheKey = descEn.slice(0, 90);
    const cachedVi = tCache[cacheKey];

    let bilingualHtml = '';
    if (descShort) {
      const viPart = descVi
        ? `<div class="nc-lang-vi">🇻🇳 ${descVi}</div>`
        : cachedVi
          ? `<div class="nc-lang-vi">🇻🇳 ${cachedVi}</div>`
          : `<div class="nc-trans-pending" data-trans-en="${escAttr(descEn.slice(0,280))}">⌛ đang dịch...</div>`;
      bilingualHtml = `<div class="nc-bilingual"><div class="nc-lang-en">🇬🇧 ${descShort}</div>${viPart}</div>`;
    }

    return `
      <a href="${item.link || '#'}" class="news-card ${type}" target="_blank" rel="noopener">
        <div class="news-card-head">
          <span class="nc-icon">${icons[type]}</span>
          <span class="nc-title">${item.title}</span>
        </div>
        <div class="nc-meta">
          <span class="nc-date">${formatDate(item.date)}</span>
          ${(item.tags||[]).map(t => `<span class="nc-tag" style="color:${tagColor(t)};border-color:${tagColor(t)}">${t}</span>`).join('')}
        </div>
        ${bilingualHtml}
        ${isLearn ? `<span class="learn-badge">📚 Liên quan bài học bạn đang học</span>` : ''}
        ${isNewSince(item) ? `<span class="new-badge">🆕 Mới từ lần trước</span>` : ''}
        ${item.link ? `<span class="nc-link">Xem chi tiết →</span>` : ''}
      </a>
    `;
  }

  // ===== JAPFA RELEVANCE =====
  // Services Japfa actually runs (from CLAUDE.md)
  const JAPFA_KEYS = [
    'ec2','instance type','ami','auto scaling',
    'rds','oracle','aurora','database',
    'alb','load balancer','nlb','elb',
    'waf','web application firewall',
    'vpc','subnet','security group',
    'vpn','site-to-site','transit gateway','tgw','bgp',
    'cloudwatch','alarm','metric','log',
    'route 53','route53','dns',
    'iam','identity','permission','role','policy',
    'organizations','control tower','scp',
    'security hub','finding','compliance',
    'cloudtrail','audit','trail',
    'inspector','vulnerability','cve','patch',
    'kms','key management','encryption',
    's3','bucket','storage',
    'cloudfront','cdn',
    'ssm','systems manager','patch manager',
    'config','configuration recorder',
    'ecs','fargate','container',
    'bedrock','generative ai','agent'
  ];

  function isJapfaRelevant(item) {
    const text = ((item.title||'') + ' ' + (item.description||'')).toLowerCase();
    const tags = (item.tags||[]).map(t => t.toLowerCase());
    return JAPFA_KEYS.some(k => text.includes(k) || tags.some(t => t.includes(k)));
  }

  // ===== RECOMMENDATIONS ENGINE =====
  function generateRecommendations() {
    if (!newsData) return [];
    const all = [...(newsData.whats_new||[]), ...(newsData.security||[]), ...(newsData.blog||[])];
    const recs = [];

    // 🚨 CRITICAL: AWS Incident đang xảy ra
    if (newsData.status?.overall === 'issues') {
      const incidents = (newsData.status.incidents||[]).slice(0,3);
      recs.push({
        priority:'critical', icon:'🚨', cat:'INCIDENT',
        title:`AWS đang có ${incidents.length} sự cố`,
        vi:'Kiểm tra ngay ảnh hưởng đến hạ tầng Japfa',
        action:'Check CloudWatch alarms ALARM state · Kiểm tra ALB target health · Monitor RDS connections',
        cmd:'aws cloudwatch describe-alarms --state-value ALARM --profile jp:prod',
        accounts:['jp:prod','jp:network'],
        refs: incidents.map(i => stripHtml(i.title||'').slice(0,55))
      });
    }

    // 🔴 HIGH: Security bulletins
    const secBulletins = newsData.security || [];
    if (secBulletins.length) {
      recs.push({
        priority:'high', icon:'🔴', cat:'SECURITY',
        title:`${secBulletins.length} Security Bulletin mới cần xem`,
        vi:'Đánh giá CVE ảnh hưởng đến EC2/RDS jp:prod',
        action:'Chạy Inspector scan → xem Security Hub findings → ưu tiên patch CRITICAL/HIGH',
        cmd:'aws inspector2 list-findings --filter-criteria \'{"fixAvailable":[{"comparison":"EQUALS","value":"YES"}]}\' --profile jp:aggregator',
        accounts:['jp:aggregator','jp:prod'],
        refs: secBulletins.slice(0,2).map(i => stripHtml(i.title||'').slice(0,55))
      });
    }

    // 🟡 EC2 updates
    const ec2 = all.filter(i => (i.tags||[]).includes('EC2') || /ec2|instance type|ami/.test(i.title.toLowerCase()));
    if (ec2.length) recs.push({
      priority:'medium', icon:'🟡', cat:'EC2',
      title:`EC2: ${ec2.length} cập nhật liên quan`,
      vi:'Kiểm tra instance S250-Webapps jp:prod',
      action:'Review cập nhật xem có áp dụng cho jp:prod · Backup AMI trước khi thay đổi',
      cmd:'aws ec2 describe-instances --filters Name=instance-state-name,Values=running --query "Reservations[*].Instances[*].[InstanceId,Tags[?Key==\'Name\'].Value|[0],State.Name]" --output table --profile jp:prod',
      accounts:['jp:prod'],
      refs:[ec2[0].title.slice(0,55)]
    });

    // 🟡 RDS updates
    const rds = all.filter(i => (i.tags||[]).includes('RDS') || /rds|oracle|database|aurora/.test(i.title.toLowerCase()));
    if (rds.length) recs.push({
      priority:'medium', icon:'🟡', cat:'RDS',
      title:`RDS: ${rds.length} cập nhật database`,
      vi:'Kiểm tra RDS Oracle jp:prod',
      action:'Review phiên bản · Snapshot trước khi patch · Lên lịch maintenance window',
      cmd:'aws rds describe-db-instances --query "DBInstances[*].[DBInstanceIdentifier,Engine,EngineVersion,DBInstanceStatus]" --output table --profile jp:prod',
      accounts:['jp:prod'],
      refs:[rds[0].title.slice(0,55)]
    });

    // 🟡 VPN/TGW/Network
    const net = all.filter(i => /vpn|transit gateway|tgw|bgp|network/.test(i.title.toLowerCase()) || (i.tags||[]).includes('TGW'));
    if (net.length) recs.push({
      priority:'medium', icon:'🟡', cat:'NETWORK',
      title:`Network: ${net.length} cập nhật VPN/TGW`,
      vi:'Monitor BGP tunnel Long An & Hương Canh',
      action:'Kiểm tra tunnel status · Test failover HC nếu cần · Xem BGP route count',
      cmd:'get router info bgp summary   (FortiGate LA: 10.82.254.254)',
      accounts:['jp:network'],
      refs:[net[0].title.slice(0,55)]
    });

    // 🟡 WAF updates
    const waf = all.filter(i => (i.tags||[]).includes('WAF') || /waf|web application firewall/.test(i.title.toLowerCase()));
    if (waf.length) recs.push({
      priority:'medium', icon:'🟡', cat:'WAF',
      title:`WAF: ${waf.length} tính năng/rules mới`,
      vi:'Xem xét bật tính năng mới cho jp:prod',
      action:'Review Web ACL logs · Xét thêm managed rule group nếu phù hợp',
      cmd:'aws wafv2 list-web-acls --scope REGIONAL --query "WebACLs[*].[Name,Id]" --output table --profile jp:prod',
      accounts:['jp:prod'],
      refs:[waf[0].title.slice(0,55)]
    });

    // 🟢 CloudWatch/Monitoring
    const cw = all.filter(i => (i.tags||[]).includes('CloudWatch') || /cloudwatch|alarm|metric|log insight/.test(i.title.toLowerCase()));
    if (cw.length) recs.push({
      priority:'low', icon:'🟢', cat:'MONITORING',
      title:`CloudWatch: ${cw.length} cập nhật giám sát`,
      vi:'Kiểm tra alarms và dashboards jp:prod',
      action:'Review alarms ALARM state · Xét tận dụng tính năng mới cho dashboard',
      cmd:'aws cloudwatch describe-alarms --state-value ALARM --output table --profile jp:prod',
      accounts:['jp:prod','jp:aggregator'],
      refs:[cw[0].title.slice(0,55)]
    });

    // 🟢 IAM/Organizations
    const iam = all.filter(i => (i.tags||[]).includes('IAM') || /iam|identity|permission|scp|organizations/.test(i.title.toLowerCase()));
    if (iam.length) recs.push({
      priority:'low', icon:'🟢', cat:'IAM',
      title:`IAM/Org: ${iam.length} cập nhật quyền truy cập`,
      vi:'Test ở jp:poc trước · Không apply thẳng lên jp:prod',
      action:'Review cập nhật · Test policy mới ở jp:poc → jp:uat → jp:prod',
      cmd:'aws iam get-account-authorization-details --profile jp:poc',
      accounts:['jp:poc','jp:uat'],
      refs:[iam[0].title.slice(0,55)]
    });

    return recs;
  }

  function renderRecommendations(recs) {
    if (!recs.length) return '';
    const pbg = { critical:'#8B0000', high:'var(--red)', medium:'var(--amber)', low:'var(--green)' };
    const plabel = { critical:'KHẨN', high:'CAO', medium:'TB', low:'THẤP' };
    return `
      <div class="recs-panel">
        <div class="recs-title">
          <span>📋 Khuyến nghị việc cần làm</span>
          <span class="recs-count">${recs.length} mục</span>
        </div>
        ${recs.map(r => `
          <div class="rec-item rec-${r.priority}">
            <div class="ri-head">
              <span>${r.icon}</span>
              <span class="ri-badge" style="background:${pbg[r.priority]}">${plabel[r.priority]}</span>
              <span class="ri-cat">${r.cat}</span>
              <span class="ri-title">${r.title}</span>
            </div>
            ${r.refs?.length ? `<div class="ri-ref">↳ ${r.refs.join(' · ')}</div>` : ''}
            <div class="ri-action">→ ${r.action}</div>
            ${r.vi ? `<div class="ri-vi">🇻🇳 ${r.vi}</div>` : ''}
            ${r.cmd ? `<div class="ri-cmd">${r.cmd}</div>` : ''}
            ${r.accounts ? `<div class="ri-accounts">${r.accounts.map(a=>`<span class="ri-account">${a}</span>`).join('')}</div>` : ''}
          </div>
        `).join('')}
      </div>
    `;
  }

  function filterNews(filter, btn) {
    currentFilter = filter;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderNews();
  }
  window.filterNews = filterNews;

  // Track accordion open state per section
  const sectionOpen = { whats_new: true, security: false, blog: false, learn: true, japfa: true };

  function toggleSection(type) {
    sectionOpen[type] = !sectionOpen[type];
    const body = document.getElementById('ns-body-' + type);
    const hdr  = document.getElementById('ns-hdr-' + type);
    if (!body || !hdr) return;
    body.classList.toggle('open', sectionOpen[type]);
    hdr.classList.toggle('open', sectionOpen[type]);
  }
  window.toggleSection = toggleSection;

  function renderSection(type, icon, enLabel, viLabel, items) {
    if (!items.length) return '';
    const isOpen = sectionOpen[type];
    return `
      <div id="ns-hdr-${type}" class="news-section-hdr ${isOpen ? 'open' : ''}" onclick="toggleSection('${type}')">
        <span>${icon} ${enLabel}</span>
        <span class="ns-vi">· ${viLabel}</span>
        <span class="ns-count">${items.length}</span>
        <span class="ns-arrow">▼</span>
      </div>
      <div id="ns-body-${type}" class="news-section-body ${isOpen ? 'open' : ''}">
        ${items.map(i => renderItem(i, type === 'learn' ? (newsData.whats_new?.includes(i) ? 'whats_new' : newsData.security?.includes(i) ? 'security' : 'blog') : type)).join('')}
      </div>
    `;
  }

  function renderNews() {
    if (!newsData) return;
    const container = document.getElementById('news-container');
    let html = '';

    if (currentFilter === 'japfa') {
      // Japfa filter: only services Japfa uses
      const wnJ  = (newsData.whats_new||[]).filter(isJapfaRelevant);
      const secJ = (newsData.security||[]).filter(isJapfaRelevant);
      const blgJ = (newsData.blog||[]).filter(isJapfaRelevant);
      const allJ = [
        ...wnJ.map(i => ({...i, _t:'whats_new'})),
        ...secJ.map(i => ({...i, _t:'security'})),
        ...blgJ.map(i => ({...i, _t:'blog'}))
      ];
      if (allJ.length) {
        const isOpen = sectionOpen['japfa'] !== false;
        html = `
          <div id="ns-hdr-japfa" class="news-section-hdr ${isOpen?'open':''}" onclick="toggleSection('japfa')">
            <span>🏭 Japfa Relevant</span>
            <span class="ns-vi">· Dịch vụ Japfa đang sử dụng</span>
            <span class="ns-count">${allJ.length}</span>
            <span class="ns-arrow">▼</span>
          </div>
          <div id="ns-body-japfa" class="news-section-body ${isOpen?'open':''}">
            ${allJ.map(i => renderItem(i, i._t)).join('')}
          </div>
        `;
      } else {
        html = `<div class="empty-news"><div class="ei">🏭</div><div>Không có tin nào liên quan đến hạ tầng Japfa hôm nay.</div></div>`;
      }
      html += renderRecommendations(generateRecommendations());

    } else if (currentFilter === 'new') {
      const wnItems  = (newsData.whats_new||[]);
      const secItems = (newsData.security||[]);
      const blogItems = (newsData.blog||[]);
      const allNew = [
        ...wnItems.filter(isNewSince).map(i => ({...i, _t:'whats_new'})),
        ...secItems.filter(isNewSince).map(i => ({...i, _t:'security'})),
        ...blogItems.filter(isNewSince).map(i => ({...i, _t:'blog'}))
      ];
      if (!prevSeenAt) {
        html = `<div class="empty-news"><div class="ei">🆕</div><div>Đây là lần đầu bạn mở trang News — chưa có mốc "lần trước" để so sánh.</div></div>`;
      } else if (allNew.length) {
        html = `<div class="news-section-body open">${allNew.map(i => renderItem(i, i._t)).join('')}</div>`;
      } else {
        html = `<div class="empty-news"><div class="ei">🆕</div><div>Không có tin mới kể từ lần bạn ghé thăm trước.</div></div>`;
      }

    } else if (currentFilter === 'learn') {
      const wnItems  = (newsData.whats_new||[]);
      const secItems = (newsData.security||[]);
      const blogItems = (newsData.blog||[]);
      const allLearn = [
        ...wnItems.filter(isRelatedToLesson),
        ...secItems.filter(isRelatedToLesson),
        ...blogItems.filter(isRelatedToLesson)
      ];
      html = allLearn.length
        ? renderSection('learn', '📚', 'Related to your lessons', 'Liên quan bài bạn đang học', allLearn)
        : `<div class="empty-news"><div class="ei">🔍</div><div>Không có tin liên quan đến bài học hiện tại.</div></div>`;

    } else {
      const getItems = (type) => {
        const items = newsData[type] || [];
        if (currentFilter !== 'all' && currentFilter !== type) return [];
        return items;
      };
      html += renderSection('whats_new', '🆕', "What's New",        'Dịch vụ & tính năng mới', getItems('whats_new'));
      html += renderSection('security',  '🔒', 'Security Bulletins', 'Bảo mật & cảnh báo',      getItems('security'));
      html += renderSection('blog',      '📝', 'AWS Blog',           'Bài viết & hướng dẫn',   getItems('blog'));
      // Always show recommendations on "Tất cả" tab
      if (currentFilter === 'all') {
        html += renderRecommendations(generateRecommendations());
      }
    }

    if (!html) html = `<div class="empty-news"><div class="ei">📭</div><div>Không có tin trong mục này.</div></div>`;
    container.innerHTML = html;
  }

  async function init() {
    try {
      const res = await fetch('./news.json');
      if (!res.ok) throw new Error('news.json not found');
      newsData = await res.json();

      // Capture the PREVIOUS visit's timestamp before overwriting it with this visit
      try { prevSeenAt = localStorage.getItem(LAST_SEEN_KEY); } catch { prevSeenAt = null; }
      try { localStorage.setItem(LAST_SEEN_KEY, new Date().toISOString()); } catch {}

      const newCount = countNewItems();
      const bannerEl = document.getElementById('new-banner');
      if (bannerEl) {
        bannerEl.innerHTML = newCount > 0
          ? `<div class="new-banner" onclick="filterNews('new', document.querySelector('[data-filter=new]'))">
               <span>🆕 ${newCount} tin mới kể từ lần bạn ghé thăm trước</span>
               <span>Xem →</span>
             </div>`
          : '';
      }

      // Last updated
      const dt = new Date(newsData.generated_at);
      document.getElementById('last-update').textContent =
        dt.toLocaleString('vi-VN', { day:'2-digit', month:'2-digit', hour:'2-digit', minute:'2-digit' });

      // Status bar
      const st = newsData.status || {};
      const isOk = st.overall === 'operational';
      const isIssue = st.overall === 'issues';
      const incidents = (st.incidents || []).slice(0, 5);

      // Build incident detail rows
      const incidentRows = isIssue && incidents.length ? incidents.map(inc => {
        const title = stripHtml(inc.title || '');
        const desc = stripHtml(inc.description || '').slice(0, 200);
        const cKey = desc.slice(0, 90);
        const cachedVi = desc ? tCache[cKey] : null;
        return `
          <div class="incident-row">
            <div class="ir-title">
              <span class="ir-dot"></span>
              <span>${title}</span>
              ${inc.date ? `<span class="ir-date">${formatDate(inc.date)}</span>` : ''}
              ${inc.link ? `<a href="${inc.link}" target="_blank" rel="noopener" class="ir-link" onclick="event.stopPropagation()">→</a>` : ''}
            </div>
            ${desc ? `
            <div class="ir-bilingual">
              <div class="ir-en">🇬🇧 ${desc}${(inc.description||'').length > 200 ? '...' : ''}</div>
              ${cachedVi
                ? `<div class="ir-vi">🇻🇳 ${cachedVi}</div>`
                : `<div class="ir-trans-pending" data-trans-en="${escAttr(desc)}">⌛ đang dịch...</div>`
              }
            </div>` : ''}
          </div>
        `;
      }).join('') : '';

      document.getElementById('status-bar').innerHTML = `
        <div class="status-bar ${isOk ? 'ok' : isIssue ? 'issues' : 'unknown'}">
          <div class="sb-main">
            <span class="sb-dot ${isOk ? 'green' : isIssue ? 'red' : 'gray'}"></span>
            <div class="sb-text">
              <div class="sb-title">${isOk ? '✅ AWS đang hoạt động bình thường' : isIssue ? '⚠️ AWS đang có sự cố — xem chi tiết bên dưới' : '❓ Không rõ trạng thái AWS'}</div>
              <div class="sb-sub">Nguồn: status.aws.amazon.com · ${isOk ? 'All systems operational' : isIssue ? `${incidents.length} sự cố được ghi nhận` : 'Status unknown'}</div>
            </div>
            <a href="https://status.aws.amazon.com" target="_blank" rel="noopener" class="sb-link">Xem →</a>
          </div>
          ${incidentRows ? `<div class="incident-list">${incidentRows}</div>` : ''}
        </div>
      `;
      renderNews();
      // Translate pending items (descriptions + incidents) in background
      requestAnimationFrame(() => translatePending());
      // Also translate incident pending rows
      requestAnimationFrame(() => {
        document.querySelectorAll('.ir-trans-pending').forEach(async el => {
          const text = el.dataset.transEn;
          delete el.dataset.transEn;
          const vi = await translateOne(text);
          if (vi) { el.className = 'ir-vi'; el.textContent = '🇻🇳 ' + vi; }
          else el.style.display = 'none';
        });
      });
    } catch {
      document.getElementById('news-container').innerHTML = `
        <div class="empty-news">
          <div class="ei">⚙️</div>
          <div style="font-weight:700;margin-bottom:8px">News chưa được tạo</div>
          <div style="font-size:.85rem;color:var(--muted)">GitHub Actions sẽ tự fetch lúc 8h sáng mỗi ngày.<br>Hoặc chạy thủ công: Actions → Fetch AWS News → Run workflow</div>
        </div>
      `;
    }
  }

  init();
  </script>
</body>
</html>
